      background-attachment: fixed;
      color: #f0dfa0;
    }
    .card {
      position: relative;
      z-index: 1;
      max-width: 540px;
      width: 100%;
      padding: 36px 32px;
      border-radius: 24px;
      background: rgba(253,250,244,0.05);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(200,164,21,0.1);

      font-weight: 400;
      letter-spacing: 0.3em;
      color: #c8a415;
      margin: 8px 0 4px;
    }
    h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35rem;
      font-weight: 400;
      color: #f0dfa0;
      margin-bottom: 20px;
      letter-spacing: 0.03em;
      line-height: 1.5;
    }
    h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: #c8a415;
      margin: 16px 0 8px;
    }

      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(200,164,21,0.5);
      margin-bottom: 20px;
    }

      padding: 13px 28px; border-radius: 999px;

<!-- Marble overlay -->
<div style="position:fixed;inset:0;background:rgba(10,6,2,0.62);pointer-events:none;z-index:0;"></div>

<!-- HOME -->
<div id="screen-home" class="card">
  <div class="logo-wrap">
    <img src="./intima-logo.png" alt="INTIMA logo">
  </div>
  <h1>INTIMA</h1>
  <p class="subtitle" id="home-subtitle">Unlock your suggestibility</p>
  <div class="lang-toggle">

    <span id="lang-es" onclick="setLang('es')">ES</span>
  </div>
  <input type="text" id="name-input" placeholder="Your first name" />
  <button class="btn" id="start-btn">Start Test</button>
</div>

<!-- QUIZ -->
<div id="screen-quiz" class="card hidden">
  <div class="progress-wrap">
    <div class="progress-bar" id="progress-bar" style="width:0%"></div>
  </div>
  <div class="counter" id="question-counter"></div>
  <h2 id="question-text"></h2>
  <div>
    <button class="btn btn-answer" id="yes-btn">Yes</button>
    <button class="btn btn-answer" id="no-btn">No</button>
  </div>
</div>

<!-- EMAIL -->
<div id="screen-email" class="card hidden">
  <h2 id="email-title">Enter your email to view your results</h2>
  <input type="email" id="email-input" placeholder="Email" />
  <div class="checkbox-wrap">
    <input type="checkbox" id="subscribed-checkbox" />
    <span id="email-subscribe-label">I'd like to receive Flowgenics updates and resources</span>
  </div>
  <button class="btn" id="email-continue-btn">View Results</button>
</div>

<!-- RESULT -->
<div id="screen-result" class="card hidden">
  <div class="logo-wrap logo-small">
    <img src="./intima-logo.png" alt="INTIMA">
  </div>
  <h2 id="result-name-title"></h2>
  <div class="result-score">
    <div class="score-pill" id="result-physical"></div>
    <div class="score-pill" id="result-emotional"></div>
  </div>
  <div class="divider"></div>
  <h3 id="interpretation-title"></h3>
  <p id="interpretation-text"></p>
  <ul id="guidance-list"></ul>
  <div class="divider"></div>
  <button class="btn" id="download-pdf-btn">⬇ Download PDF</button>
  <div id="back-to-michelangelo" style="display:none; margin-top:12px;">
    <button class="btn btn-secondary" onclick="window.location.href='https://michelangelo-ai.vercel.app/chat'">

  </div>

      </div>
      <div style="background:rgba(200,164,21,0.1); border:1px solid rgba(200,164,21,0.3); border-radius:999px; padding:10px 24px; text-align:center;">

      </div>

    <ul id="pdf-guidance" style="color:rgba(240,223,160,0.7); font-size:13px; line-height:1.8; padding-left:20px;"></ul>

    <hr style="border:none; border-top:1px solid rgba(200,164,21,0.15); margin:28px 0 16px;" />
    <p style="text-align:center; font-size:12px; color:rgba(200,164,21,0.4);">www.flowgenicscoaching.com</p>
  </div>
</div>

function snap5(n) { return Math.round(n / 5) * 5; }
function lookupPhysicalPercent(physicalRaw, combined) {
  let pr = snap5(physicalRaw); let cs = snap5(combined);
  pr = Math.max(0, Math.min(100, pr)); cs = Math.max(50, Math.min(200, cs));
  if (cs < pr) cs = pr;
  const row = SCORING_TABLE[pr]; const idx = COMBINED_AXIS.indexOf(cs);
  if (!row || idx === -1) return 0;
  return row[idx];
}

// ─── STATE ────────────────────────────────────────────────────────────────────
let index = 0, scoreQ1 = 0, scoreQ2 = 0;
let capturedEmail = null, participantName = null;

const screens = {
  home: document.getElementById("screen-home"),
  quiz: document.getElementById("screen-quiz"),
  email: document.getElementById("screen-email"),
  result: document.getElementById("screen-result")
};
function showScreen(name) {
  Object.values(screens).forEach(s => s.classList.add("hidden"));
  screens[name].classList.remove("hidden");
}
function showQuestion() {
  const q = QUESTIONS[index];
  const u = UI[currentLang];
  document.getElementById("question-counter").textContent = u.questionOf(index + 1, QUESTIONS.length);
  document.getElementById("question-text").textContent = currentLang === "es" ? q.textEs : q.textEn;
  document.getElementById("progress-bar").style.width = `${(index / QUESTIONS.length) * 100}%`;
}
function answer(yes) {
  const q = QUESTIONS[index];
  if (yes) { if (q.questionnaire === 1) scoreQ1 += q.weight; else scoreQ2 += q.weight; }
  index++;
  if (index < QUESTIONS.length) showQuestion(); else showScreen("email");
}

async function finishQuiz() {
  const u = UI[currentLang];
  const physicalRaw = scoreQ1, emotionalRaw = scoreQ2;
  const combined = physicalRaw + emotionalRaw;
  const physicalPercent = lookupPhysicalPercent(physicalRaw, combined);
  const emotionalPercent = 100 - physicalPercent;
  const interp = INTERPRETATIONS[currentLang].find(r => physicalPercent >= r.min && physicalPercent <= r.max);
  const guidance = GUIDANCE[currentLang].find(r => physicalPercent >= r.min && physicalPercent <= r.max);

  // Result screen
  document.getElementById("result-name-title").textContent = u.resultTitle(participantName);
  document.getElementById("result-physical").textContent = u.physical(physicalPercent);
  document.getElementById("result-emotional").textContent = u.emotional(emotionalPercent);
  document.getElementById("interpretation-title").textContent = interp.title;
  document.getElementById("interpretation-text").textContent = interp.text;
  const listEl = document.getElementById("guidance-list");
  listEl.innerHTML = "";
  guidance.bullets.forEach(b => { const li = document.createElement("li"); li.textContent = b; listEl.appendChild(li); });

  // PDF content
  document.getElementById("pdf-name").textContent = `${participantName}'s Results`;
  document.getElementById("pdf-physical").textContent = u.pdfPhysical(physicalPercent);
  document.getElementById("pdf-emotional").textContent = u.pdfEmotional(emotionalPercent);
  document.getElementById("pdf-title").textContent = interp.title;
  document.getElementById("pdf-text").textContent = interp.text;
  const pdfList = document.getElementById("pdf-guidance");
  pdfList.innerHTML = "";
  guidance.bullets.forEach(b => { const li = document.createElement("li"); li.textContent = b; li.style.marginBottom = "6px"; pdfList.appendChild(li); });

  // Send email
  if (capturedEmail) {
    fetch("/api/send-email", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: participantName, email: capturedEmail, physicalPercent, emotionalPercent, resultTitle: interp.title, resultText: interp.text, subscribed: window.isSubscribed || false })
    }).catch(err => console.error("Email error:", err));
  }

  // Save to Supabase
  const { error } = await supabase.from("results").insert([{ name: participantName, email: capturedEmail, physicalRaw, emotionalRaw, combined, physicalPercent, emotionalPercent, subscribed: window.isSubscribed || false }]);
  if (error) console.error("Supabase error:", error);

  showScreen("result");

  // Sync to Michelangelo AI if client_id present
  const urlParams = new URLSearchParams(window.location.search);
  const michelangeloClientId = urlParams.get("client_id");
  if (michelangeloClientId) {
    try {
      await fetch("https://michelangelo-ai.vercel.app/api/assessments/save-results", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ client_id: michelangeloClientId, assessment_type: "suggestibility", secret: "flowgenics-mich-2025-xK9p", results: { dominant: physicalPercent >= 50 ? "Physical" : "Emotional", physical_percent: physicalPercent, emotional_percent: emotionalPercent, completed_at: new Date().toISOString() } })
      });
    } catch(e) { console.log("Michelangelo sync skipped", e); }
    document.getElementById("back-to-michelangelo").style.display = "block";
    document.querySelector("#back-to-michelangelo button").textContent = u.backBtn;
  }
}

document.getElementById("start-btn").onclick = () => {
  const nameValue = document.getElementById("name-input").value.trim();
  if (!nameValue) { alert(UI[currentLang].nameAlert); return; }
  participantName = nameValue; index = 0; scoreQ1 = 0; scoreQ2 = 0;
  showScreen("quiz"); showQuestion();
};
document.getElementById("yes-btn").onclick = () => answer(true);
document.getElementById("no-btn").onclick = () => answer(false);
document.getElementById("email-continue-btn").onclick = () => {
  const emailValue = document.getElementById("email-input").value.trim();
  const subscribed = document.getElementById("subscribed-checkbox").checked;
  if (!emailValue) { alert(UI[currentLang].emailAlert); return; }
  capturedEmail = emailValue; window.isSubscribed = subscribed; finishQuiz();
};

  pdfEl.style.display = "block";
  html2pdf().set({
    margin: 10,
    filename: "INTIMA_Result.pdf",
    html2canvas: { scale: 2 },
    jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }
  }).from(pdfEl).save().then(() => { pdfEl.style.display = "none"; });
};
